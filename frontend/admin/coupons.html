<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Coupons - Clovas Shopping</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex">

  <!-- Left Sidebar Panel Navigator -->
  <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col justify-between p-6">
    <div class="flex flex-col gap-8">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <img src="../assets/logo-removebg.png" alt="C" class="h-9 w-9 object-contain rounded-xl">
        <span class="font-serif text-lg font-bold text-white tracking-wide">Clovas Admin</span>
      </div>

      <!-- Links -->
      <nav class="flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
          Overview
        </a>
        <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Manage Products
        </a>
        <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Manage Orders
        </a>
        <a href="coupons.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary-600 text-white font-semibold text-xs shadow-md transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
          Coupons Management
        </a>
      </nav>
    </div>

    <a href="../index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-950/20 hover:text-red-400 font-semibold text-xs transition-all border border-slate-800">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Exit Dashboard
    </a>
  </aside>

  <!-- Main Content Body -->
  <main class="flex-grow p-10 max-h-screen overflow-y-auto">
    <!-- Header -->
    <header class="flex justify-between items-center pb-6 border-b border-slate-200 dark:border-slate-800 mb-8">
      <div>
        <h1 class="font-serif text-2xl md:text-3xl font-bold">Manage Coupons</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Setup discount promo codes for campaigns</p>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Coupons List -->
      <section class="lg:col-span-2 glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40">
        <h3 class="font-serif text-lg font-bold border-b border-slate-150 dark:border-slate-800 pb-3 mb-5">Campaign Coupons</h3>
        
        <div class="overflow-x-auto">
          <table class="w-full text-left text-xs font-medium border-collapse">
            <thead>
              <tr class="text-slate-400 uppercase tracking-wider border-b border-slate-150 dark:border-slate-850">
                <th class="pb-3">Code</th>
                <th class="pb-3">Discount</th>
                <th class="pb-3">Min Purchase</th>
                <th class="pb-3">Expiry Date</th>
                <th class="pb-3 text-right">Action</th>
              </tr>
            </thead>
            <tbody id="admin-coupons-rows" class="divide-y divide-slate-100 dark:divide-slate-850">
              <!-- Loaded dynamically by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Add Coupon Form -->
      <section class="glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40">
        <h3 class="font-serif text-lg font-bold border-b border-slate-150 dark:border-slate-800 pb-3 mb-5">Create Promo Coupon</h3>
        
        <form id="coupon-form" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Coupon Code</label>
            <input type="text" id="coupon-code" required placeholder="e.g. SUMMER30" class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white uppercase focus:outline-none">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Type</label>
              <select id="coupon-type" class="w-full px-3 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
                <option value="flat">Flat Cash BDT</option>
                <option value="percentage">Percentage %</option>
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Value</label>
              <input type="number" id="coupon-value" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Min Purchase BDT</label>
            <input type="number" id="coupon-min-purchase" value="0" class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>

          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Expiry Date</label>
            <input type="date" id="coupon-expiry" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>

          <button type="submit" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs rounded-xl shadow-md transition-colors">Create Coupon</button>
        </form>
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/api.js"></script>
  <script type="module" src="../js/admin.js"></script>
  <script type="module">
    import { initCouponsPanel } from '../js/admin.js';
    document.addEventListener('DOMContentLoaded', initCouponsPanel);
  </script>
</body>
</html>
