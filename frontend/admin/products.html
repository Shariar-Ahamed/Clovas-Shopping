<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - Clovas Shopping</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex">

  <!-- Left Sidebar Panel Navigator -->
  <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col justify-between p-6">
    <div class="flex flex-col gap-8">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <img src="../assets/logo-removebg.png" alt="C" class="h-9 w-auto object-contain">
        <span class="font-serif text-lg font-bold text-white tracking-wide">Clovas Admin</span>
      </div>

      <!-- Links -->
      <nav class="flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
          Overview
        </a>
        <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary-600 text-white font-semibold text-xs shadow-md transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Manage Products
        </a>
        <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Manage Orders
        </a>
        <a href="coupons.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
          Coupons Management
        </a>
      </nav>
    </div>

    <a href="../index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-950/20 hover:text-red-400 font-semibold text-xs transition-all border border-slate-800">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Exit Dashboard
    </a>
  </aside>

  <!-- Main Content Body -->
  <main class="flex-grow p-10 max-h-screen overflow-y-auto">
    <!-- Header -->
    <header class="flex justify-between items-center pb-6 border-b border-slate-200 dark:border-slate-800 mb-8">
      <div>
        <h1 class="font-serif text-2xl md:text-3xl font-bold">Manage Products</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Add, update, and remove items from Clovas Catalog</p>
      </div>
      <button id="open-add-modal-btn" class="px-5 py-3 bg-primary-600 hover:bg-primary-700 text-white font-bold text-xs rounded-xl shadow-md transition-all flex items-center gap-2">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add New Product
      </button>
    </header>

    <!-- Toolbar Filters -->
    <section class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800/40">
      <div class="relative w-full sm:w-80">
        <input type="text" id="admin-product-search" placeholder="Search catalog..." class="w-full pl-4 pr-10 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-850 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
        <span class="absolute right-3 top-3 text-slate-400"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></span>
      </div>
      <div class="text-xs font-semibold text-slate-500">
        Total: <span id="admin-products-count" class="text-slate-800 dark:text-white">0</span> products
      </div>
    </section>

    <!-- Table Grid -->
    <section class="glass rounded-3xl border border-slate-100 dark:border-slate-800/40 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-xs font-medium border-collapse">
          <thead>
            <tr class="bg-slate-100 dark:bg-slate-900 text-slate-400 uppercase tracking-wider border-b border-slate-200 dark:border-slate-850">
              <th class="p-4 pl-6">Product Image & Title</th>
              <th class="p-4">Category</th>
              <th class="p-4">Price</th>
              <th class="p-4">Stock</th>
              <th class="p-4 pr-6 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-products-rows" class="divide-y divide-slate-100 dark:divide-slate-850">
            <!-- Loaded dynamically by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Modal Form (Add/Edit) -->
    <div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-sm hidden transition-all">
      <div class="w-full max-w-2xl glass p-8 rounded-3xl border border-slate-100 dark:border-slate-900 shadow-2xl max-h-[85vh] overflow-y-auto m-4">
        <div class="flex justify-between items-center border-b border-slate-150 dark:border-slate-800 pb-4 mb-6">
          <h3 class="font-serif text-xl font-bold" id="modal-title">Add New Product</h3>
          <button id="close-modal-btn" class="h-9 w-9 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 text-xl font-bold flex items-center justify-center transition-colors">&times;</button>
        </div>

        <form id="product-form" class="space-y-5">
          <input type="hidden" id="form-product-id">
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Product Title</label>
              <input type="text" id="form-title" required class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Active Stock</label>
              <input type="number" id="form-stock" required class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Price BDT</label>
              <input type="number" id="form-price" required class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Discount Price</label>
              <input type="number" id="form-discount-price" value="0" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Gender Fit</label>
              <select id="form-gender" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
                <option value="Men">Men</option>
                <option value="Women">Women</option>
                <option value="Accessories">Accessories</option>
                <option value="Unisex">Unisex</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Main Category</label>
              <input type="text" id="form-category" required placeholder="e.g. Men, Women, Accessories" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Sub Category</label>
              <input type="text" id="form-subcategory" required placeholder="e.g. Shirts, Kurti, Watches" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
            </div>
          </div>

          <!-- Description -->
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Product Description</label>
            <textarea id="form-desc" required rows="3" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none"></textarea>
          </div>

          <!-- Highlight Checkboxes -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 p-4 bg-slate-100/50 dark:bg-slate-900/50 rounded-2xl border border-slate-150 dark:border-slate-800 text-xs">
            <label class="flex items-center gap-2 font-medium">
              <input type="checkbox" id="form-featured" class="rounded text-primary-500">
              Featured
            </label>
            <label class="flex items-center gap-2 font-medium">
              <input type="checkbox" id="form-trending" class="rounded text-primary-500">
              Trending
            </label>
            <label class="flex items-center gap-2 font-medium">
              <input type="checkbox" id="form-bestseller" class="rounded text-primary-500">
              Best Seller
            </label>
            <label class="flex items-center gap-2 font-medium">
              <input type="checkbox" id="form-newarrival" checked class="rounded text-primary-500">
              New Arrival
            </label>
          </div>

          <!-- Cloudinary Image Upload -->
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-550 mb-1.5">Product Image (Cloudinary Link)</label>
            <div class="flex gap-3">
              <input type="text" id="form-image-url" required placeholder="Select a file to upload or enter direct URL" class="flex-1 px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
              
              <!-- File selector wrapper -->
              <label class="px-5 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 cursor-pointer flex items-center justify-center transition-colors">
                <input type="file" id="form-image-file" class="hidden">
                Upload File
              </label>
            </div>
            <p id="upload-status-msg" class="text-xs font-semibold mt-2 text-primary-500 hidden">Uploading to Cloudinary...</p>
          </div>

          <button type="submit" id="save-product-btn" class="w-full py-4 bg-primary-600 hover:bg-primary-700 text-white font-bold text-sm rounded-xl shadow-md transition-colors flex items-center justify-center">Save Product</button>
        </form>
      </div>
    </div>

  </main>

  <!-- Scripts -->
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/api.js"></script>
  <script type="module" src="../js/admin.js"></script>
  <script type="module">
    import { initProductsPanel } from '../js/admin.js';
    document.addEventListener('DOMContentLoaded', initProductsPanel);
  </script>
</body>
</html>
