  <title>System Settings - Clovas Shopping</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            serif: ['Poppins', 'sans-serif'],
          },
          colors: {

</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex">

  <!-- Left Sidebar Panel Navigator -->
  <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col justify-between p-6">
    <div class="flex flex-col gap-8">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <img src="../assets/logo-removebg.png" alt="C" class="h-7 w-auto object-contain">
        <span class="font-serif text-lg font-bold text-white tracking-wide">Clovas Admin</span>
      </div>

      <!-- Links -->
      <nav class="flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zm10 0a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
          Overview
        </a>
        <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Manage Products
        </a>
        <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Manage Orders
        </a>
        <a href="coupons.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
          Coupons Management
        </a>
        <a href="shoppers.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white font-semibold text-xs transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v12a2 2 0 01-2 2h-6a2 2 0 01-2-2V20h5zM12 4a4 4 0 110 8 4 4 0 010-8zm0 10c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z" /></svg>
          Manage Shoppers
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary-600 text-white font-semibold text-xs shadow-md transition-all">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          System Settings
        </a>
      </nav>
    </div>

    <a href="../index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-950/20 hover:text-red-400 font-semibold text-xs transition-all border border-slate-800">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Exit Dashboard
    </a>
  </aside>

  <!-- Main Content Body -->
  <main class="flex-grow p-10 max-h-screen overflow-y-auto">
    <!-- Header -->
    <header class="flex justify-between items-center pb-6 border-b border-slate-200 dark:border-slate-800 mb-8">
      <div>
        <h1 class="font-serif text-2xl md:text-3xl font-bold">System Settings</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Configure global variables, sales campaign, shipping and contact details</p>
      </div>
    </header>

    <form id="settings-form" class="space-y-8 max-w-3xl">
      
      <!-- Section 1: Flash Sale Campaigns -->
      <section class="glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40 space-y-4">
        <h3 class="font-serif text-lg font-bold border-b border-slate-150 dark:border-slate-800 pb-3 flex items-center justify-between">
          <span>Flash Sale Campaign Settings</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="setting-flash-sale-enabled" class="sr-only peer">
            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none dark:bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
          </label>
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Discount Banner Text</label>
            <input type="text" id="setting-flash-sale-text" class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">End Date & Time</label>
            <div class="relative">
              <input type="datetime-local" id="setting-flash-sale-date" class="w-full px-4 py-2.5 pr-10 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
              <span class="absolute right-3.5 top-3 text-slate-400 pointer-events-none">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
              </span>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 2: Shipping Fees & Logistics -->
      <section class="glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40 space-y-4">
        <h3 class="font-serif text-lg font-bold border-b border-slate-150 dark:border-slate-800 pb-3">Shipping Fees & Thresholds</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Standard Shipping Fee (BDT)</label>
            <input type="number" id="setting-shipping-standard" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Outside City Shipping Fee (BDT)</label>
            <input type="number" id="setting-shipping-outside" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Free Shipping Threshold (BDT)</label>
            <input type="number" id="setting-shipping-threshold" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
        </div>
      </section>

      <!-- Section 3: Contact & Social Media Information -->
      <section class="glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40 space-y-4">
        <h3 class="font-serif text-lg font-bold border-b border-slate-150 dark:border-slate-800 pb-3">Site Contacts & Social Media</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Support Phone</label>
            <input type="text" id="setting-support-phone" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Support Email</label>
            <input type="email" id="setting-support-email" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Facebook Page URL</label>
            <input type="url" id="setting-facebook-url" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">Instagram Profile URL</label>
            <input type="url" id="setting-instagram-url" required class="w-full px-4 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 text-slate-800 dark:text-white focus:outline-none">
          </div>
        </div>
      </section>

      <div class="flex gap-4">
        <button type="submit" id="save-settings-btn" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-bold text-xs rounded-xl shadow-md transition-colors">Save Settings</button>
      </div>

    </form>
  </main>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/api.js"></script>
  <script type="module" src="./js/settings.js"></script>
</body>
</html>
