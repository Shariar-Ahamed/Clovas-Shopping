<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clovas Shopping - Account Access</title>
  <link rel="icon" type="image/png" href="assets/logo-removebg.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes checkmark-stroke {
      100% {
        stroke-dashoffset: 0;
      }
    }
    .checkmark-path {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: checkmark-stroke 0.8s cubic-bezier(0.65, 0, 0.45, 1) 0.3s forwards;
    }
    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .animate-bounce-short {
      animation: bounce-short 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex flex-col justify-between transition-colors duration-300">

  <!-- Dynamic Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Main Container -->
  <main class="flex-grow flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md glass p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-900 transition-all duration-300 animate-scale-up">
      
      <!-- Logo Accent -->
      <div class="text-center mb-8">
        <img src="assets/logo-removebg.png" alt="Clovas" class="inline-flex h-9 w-auto object-contain mb-2">
        <h2 id="auth-title" class="font-serif text-3xl font-bold tracking-tight text-slate-800 dark:text-white">Welcome Back</h2>
        <p id="auth-subtitle" class="text-sm text-slate-550 dark:text-slate-400 mt-2 font-sans">Sign in to your premium shopping account</p>
      </div>

      <!-- Error Alert -->
      <div id="auth-error-alert" class="hidden mb-6 p-4 rounded-xl border border-red-200 bg-red-50 text-red-700 text-sm font-medium dark:bg-red-950/20 dark:border-red-900/30 dark:text-red-400">
        <span id="auth-error-message"></span>
      </div>

      <!-- Forms Wrapper -->
      <div>
        <!-- LOGIN FORM -->
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Email Address</label>
            <input type="email" id="login-email" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <!-- Password Input (Hidden when OTP mode is active) -->
          <div id="login-password-group">
            <div class="flex justify-between items-center mb-2">
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
              <button type="button" id="goto-forgot" class="text-xs font-semibold text-primary-600 dark:text-primary-400 hover:underline">Forgot?</button>
            </div>
            <input type="password" id="login-password" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>

          <!-- OTP Verification Group (Hidden by default) -->
          <div id="login-otp-group" class="hidden space-y-3">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Verification Code (OTP)</label>
            <div class="flex gap-2">
              <input type="text" id="login-otp" placeholder="6-digit code" maxlength="6" class="flex-grow px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <button type="button" id="send-otp-btn" class="px-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-bold rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors whitespace-nowrap">Send OTP</button>
            </div>
            <p id="otp-timer-message" class="text-[10px] font-semibold text-emerald-600 dark:text-emerald-450 hidden"></p>
          </div>

          <!-- Switch Auth Mode Link -->
          <div class="text-right">
            <button type="button" id="toggle-otp-mode-btn" class="text-xs font-semibold text-primary-600 dark:text-primary-400 hover:underline">Sign In with OTP</button>
          </div>

          <button type="submit" class="w-full py-4 text-sm font-bold text-white bg-gradient-to-tr from-primary-600 to-primary-500 rounded-xl hover:from-primary-700 hover:to-primary-600 shadow-md transition-all">Sign In</button>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" class="space-y-5 hidden">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Full Name</label>
            <input type="text" id="register-name" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Email Address</label>
            <input type="email" id="register-email" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Password</label>
            <input type="password" id="register-password" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Confirm Password</label>
            <input type="password" id="register-confirm-password" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <button type="submit" class="w-full py-4 text-sm font-bold text-white bg-gradient-to-tr from-emerald-600 to-emerald-500 rounded-xl hover:from-emerald-700 hover:to-emerald-600 shadow-md transition-all">Create Account</button>
        </form>

        <!-- FORGOT PASSWORD FORM -->
        <form id="forgot-form" class="space-y-5 hidden">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Email Address</label>
            <input type="email" id="forgot-email" required class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
          </div>
          <button type="submit" class="w-full py-4 text-sm font-bold text-white bg-gradient-to-tr from-primary-600 to-primary-500 rounded-xl hover:from-primary-700 hover:to-primary-600 shadow-md transition-all">Send Reset Link</button>
          <div class="text-center">
            <button type="button" id="back-to-login" class="text-xs font-semibold text-slate-655 hover:text-primary-600 dark:text-slate-400 hover:underline">Back to Sign In</button>
          </div>
        </form>
      </div>

      <!-- Social Provider Button -->
      <div id="social-divider" class="my-6 flex items-center justify-between">
        <span class="w-1/5 border-b border-slate-200 dark:border-slate-800"></span>
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-450 dark:text-slate-500">Or continue with</span>
        <span class="w-1/5 border-b border-slate-200 dark:border-slate-800"></span>
      </div>

      <button id="google-login-btn" class="w-full py-3.5 px-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center justify-center gap-3 transition-colors">
        <!-- Google Icon -->
        <svg class="h-5 w-5" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.486 0-6.313-2.827-6.313-6.313S10.505 5.89 13.99 5.89c1.614 0 3.08.61 4.2 1.614l3.05-3.048C19.347 2.73 16.89 1.7 13.99 1.7 8.307 1.7 3.7 6.307 3.7 12s4.607 10.3 10.29 10.3c6.262 0 10.44-4.394 10.44-10.63 0-.616-.056-1.085-.124-1.385H12.24z"/></svg>
        Sign in with Google
      </button>

      <!-- Toggle Links -->
      <div id="toggle-container" class="mt-8 text-center text-sm font-medium">
        <span id="toggle-text" class="text-slate-500 dark:text-slate-400">Don't have an account?</span>
        <button id="toggle-auth-btn" class="text-primary-600 dark:text-primary-400 font-bold ml-1.5 hover:underline">Create one</button>
      </div>

    </div>
  </main>

  <!-- Registration OTP Verification Modal -->
  <div id="register-otp-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 backdrop-blur-md hidden animate-fade-in">
    <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-3xl border border-slate-150/80 dark:border-slate-800/80 shadow-2xl relative mx-4 animate-scale-up">
      <!-- Close Button -->
      <button id="close-otp-modal-btn" class="absolute top-5 right-5 p-1.5 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <!-- Main Modal Content (Form & Title) -->
      <div id="otp-modal-form-content">
        <!-- Brand Header -->
        <div class="text-center mb-6">
          <img src="assets/logo-removebg.png" alt="Clovas" class="inline-flex h-9 w-auto object-contain mb-3">
          <h3 class="font-serif text-2xl font-bold tracking-tight text-slate-800 dark:text-white">Verify Your Email</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">We sent a 6-digit OTP code to <br><span id="otp-sent-email" class="font-semibold text-slate-700 dark:text-slate-200"></span></p>
        </div>

        <!-- OTP Error Alert inside modal -->
        <div id="modal-error-alert" class="hidden mb-5 p-4 rounded-xl border border-red-200 bg-red-50 text-red-700 text-xs font-semibold dark:bg-red-950/20 dark:border-red-900/30 dark:text-red-400">
          <span id="modal-error-message"></span>
        </div>

        <!-- Verification Form -->
        <form id="otp-verification-form" class="space-y-5">
          <div>
            <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Enter Verification Code</label>
            <input type="text" id="verification-otp" placeholder="6-digit code" maxlength="6" required class="w-full px-4 py-3.5 text-center text-xl font-bold tracking-widest rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-slate-850 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-inner placeholder-slate-400">
          </div>
          <div class="flex justify-between items-center text-xs font-semibold">
            <div class="flex items-center gap-2">
              <!-- Pulsing indicator dot -->
              <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
              </span>
              <span class="text-slate-500">Code expires in:</span>
            </div>
            <span id="countdown-timer" class="text-emerald-600 dark:text-emerald-450 font-bold font-mono tracking-wider">05:00</span>
          </div>
          <button type="submit" class="w-full py-4 text-sm font-bold text-white bg-gradient-to-tr from-primary-600 to-primary-500 rounded-xl hover:from-primary-700 hover:to-primary-600 hover:shadow-lg shadow-md transition-all active:scale-[0.98] duration-150">Verify & Register</button>
          <button type="button" id="modal-resend-btn" disabled class="w-full py-3 text-xs font-bold text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-850 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-850 hover:text-slate-700 dark:hover:text-slate-200 transition-all disabled:opacity-40 disabled:hover:bg-transparent disabled:cursor-not-allowed">Resend OTP</button>
        </form>
      </div>

      <!-- Success Screen Content (Initially Hidden) -->
      <div id="otp-modal-success-content" class="hidden text-center py-6 animate-scale-up">
        <div class="flex flex-col items-center justify-center">
          <!-- Animated Checkmark Icon Wrapper -->
          <div class="relative flex items-center justify-center h-24 w-24 rounded-full bg-emerald-50 dark:bg-emerald-950/30 text-emerald-500 mb-6 animate-bounce-short shadow-lg shadow-emerald-500/10">
            <!-- Pulsing outer ring -->
            <span class="absolute inset-0 rounded-full bg-emerald-400/20 dark:bg-emerald-500/10 animate-ping"></span>
            <!-- Draw checkmark animation -->
            <svg class="h-12 w-12 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" class="checkmark-path"></polyline>
            </svg>
          </div>
          <h4 class="text-2xl font-serif font-bold tracking-tight text-slate-800 dark:text-white mb-2">Verification Successful!</h4>
          <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs mx-auto mt-2 leading-relaxed">
            Welcome to <strong class="text-slate-700 dark:text-white">Clovas Shopping</strong>.<br>
            Creating your secure account and redirecting you to your dashboard...
          </p>
        </div>
      </div>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
