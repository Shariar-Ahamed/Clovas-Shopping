<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Clovas Shopping</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
                extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            serif: ['Poppins', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Cart Section -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <h1 class="font-serif text-3xl font-bold mb-10">Shopping Bag</h1>
    
    <div class="flex flex-col lg:flex-row gap-10">
      
      <!-- Cart items list -->
      <section class="w-full lg:w-2/3 flex flex-col gap-6" id="cart-items-container">
        <!-- Rendered by JS -->
      </section>

      <!-- Order Summary Card -->
      <aside class="w-full lg:w-1/3">
        <div class="glass p-6 md:p-8 rounded-3xl border border-slate-100 dark:border-slate-800/40 sticky top-28 flex flex-col gap-6">
          <h3 class="font-serif text-xl font-bold border-b border-slate-150 dark:border-slate-800 pb-4">Order Summary</h3>

          <!-- Coupon code input -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Discount Coupon</label>
            <div class="flex gap-2">
              <input type="text" id="coupon-input" placeholder="e.g. SAVE20" class="flex-1 px-4 py-2.5 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 uppercase focus:outline-none focus:ring-2 focus:ring-primary-500">
              <button id="apply-coupon-btn" class="px-5 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors">Apply</button>
            </div>
            <!-- Alert message -->
            <p id="coupon-message" class="text-xs font-medium mt-2 hidden"></p>
          </div>

          <!-- Price summary breakdown -->
          <div class="space-y-3.5 border-t border-slate-150 dark:border-slate-800 pt-6">
            <div class="flex justify-between items-center text-sm font-medium text-slate-550 dark:text-slate-400">
              <span>Bag Subtotal</span>
              <span id="summary-subtotal">0 BDT</span>
            </div>
            
            <div id="coupon-discount-row" class="flex justify-between items-center text-sm font-medium text-emerald-600 dark:text-emerald-400 hidden">
              <span>Coupon Discount (<span id="active-coupon-code"></span>)</span>
              <span>- <span id="summary-discount">0</span> BDT</span>
            </div>

            <div class="flex justify-between items-center text-sm font-medium text-slate-550 dark:text-slate-400">
              <span>Shipping Delivery</span>
              <span id="summary-shipping">100 BDT</span>
            </div>

            <div class="flex justify-between items-center text-lg font-bold border-t border-slate-150 dark:border-slate-800 pt-4">
              <span>Estimated Total</span>
              <span id="summary-total" class="text-primary-600 dark:text-white">0 BDT</span>
            </div>
          </div>

          <!-- Checkout button -->
          <button id="checkout-btn" class="w-full py-4 bg-primary-600 text-white font-bold text-sm rounded-xl hover:bg-primary-700 shadow-md transition-colors flex items-center justify-center gap-2">
            Proceed to Checkout
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </button>

          <!-- Back to shop link -->
          <a href="shop.html" class="text-center text-xs font-bold text-slate-555 hover:text-primary-600 dark:text-slate-400 hover:underline">Continue Shopping</a>
        </div>
      </aside>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/cart.js"></script>
</body>
</html>
