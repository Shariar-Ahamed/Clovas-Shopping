<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Clovas Shopping</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
                extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            serif: ['Poppins', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Checkout Container -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <h1 class="font-serif text-3xl font-bold mb-10">Checkout</h1>

    <div class="flex flex-col lg:flex-row gap-10">
      
      <!-- Checkout Form -->
      <section class="w-full lg:w-2/3 flex flex-col gap-8">
        
        <!-- Saved Addresses selection (Premium experience) -->
        <div id="saved-addresses-section" class="glass p-6 rounded-3xl border border-slate-100 dark:border-slate-800/40 hidden">
          <h3 class="font-serif text-lg font-bold mb-4">Choose a Saved Address</h3>
          <div id="address-options-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Address cards injected dynamically -->
          </div>
        </div>

        <!-- Address Inputs Form -->
        <div class="glass p-6 md:p-8 rounded-3xl border border-slate-100 dark:border-slate-850/40">
          <h3 class="font-serif text-xl font-bold border-b border-slate-150 dark:border-slate-800 pb-4 mb-6">Shipping Address</h3>
          
          <form id="shipping-form" class="space-y-5">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Recipient Name</label>
                <input type="text" id="ship-name" required class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Contact Phone</label>
                <input type="text" id="ship-phone" required class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Street Address</label>
              <input type="text" id="ship-street" required placeholder="Apartment, house, block number" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">City</label>
                <input type="text" id="ship-city" required class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Zip/Postal Code</label>
                <input type="text" id="ship-zip" required class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Country</label>
                <input type="text" id="ship-country" value="Bangladesh" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              </div>
            </div>
          </form>
        </div>

        <!-- Payment Selector -->
        <div class="glass p-6 md:p-8 rounded-3xl border border-slate-100 dark:border-slate-850/40">
          <h3 class="font-serif text-xl font-bold border-b border-slate-150 dark:border-slate-800 pb-4 mb-6">Payment Method</h3>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- SSLCommerz -->
            <label class="flex items-center gap-4 p-4 rounded-xl border-2 border-primary-600 bg-primary-50/10 dark:bg-primary-950/10 cursor-pointer transition-all relative" id="payment-ssl-card">
              <input type="radio" name="payment_method" value="SSLCommerz" checked class="hidden">
              <span class="h-5 w-5 rounded-full border-2 border-primary-600 flex items-center justify-center flex-shrink-0">
                <span class="h-2.5 w-2.5 rounded-full bg-primary-600"></span>
              </span>
              <div>
                <h4 class="font-bold text-sm">SSLCommerz Digital BDT</h4>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5">Pay via bKash, Rocket, Nagad, Visa/Mastercard</p>
              </div>
            </label>

            <!-- COD -->
            <label class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-slate-350 transition-all relative" id="payment-cod-card">
              <input type="radio" name="payment_method" value="COD" class="hidden">
              <span class="h-5 w-5 rounded-full border border-slate-300 dark:border-slate-700 flex items-center justify-center flex-shrink-0">
                <span class="h-2.5 w-2.5 rounded-full bg-transparent"></span>
              </span>
              <div>
                <h4 class="font-bold text-sm">Cash on Delivery (COD)</h4>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5">Pay cash at the time of delivery</p>
              </div>
            </label>
          </div>
        </div>

      </section>

      <!-- Order Recap summary -->
      <aside class="w-full lg:w-1/3">
        <div class="glass p-6 md:p-8 rounded-3xl border border-slate-100 dark:border-slate-800/40 sticky top-28 flex flex-col gap-6">
          <h3 class="font-serif text-xl font-bold border-b border-slate-150 dark:border-slate-800 pb-4">Recap Summary</h3>

          <div id="recap-items" class="space-y-4 max-h-56 overflow-y-auto pr-2">
            <!-- Injected by JS -->
          </div>

          <div class="space-y-3.5 border-t border-slate-150 dark:border-slate-800 pt-6">
            <div class="flex justify-between items-center text-sm font-medium text-slate-500 dark:text-slate-400">
              <span>Subtotal</span>
              <span id="recap-subtotal">0 BDT</span>
            </div>
            
            <div id="recap-discount-row" class="flex justify-between items-center text-sm font-medium text-emerald-600 dark:text-emerald-400 hidden">
              <span>Coupon Discount</span>
              <span>- <span id="recap-discount">0</span> BDT</span>
            </div>

            <div class="flex justify-between items-center text-sm font-medium text-slate-500 dark:text-slate-400">
              <span>Delivery Shipping</span>
              <span id="recap-shipping">0 BDT</span>
            </div>

            <div class="flex justify-between items-center text-lg font-bold border-t border-slate-150 dark:border-slate-800 pt-4">
              <span>Grand Total</span>
              <span id="recap-total" class="text-primary-600 dark:text-white">0 BDT</span>
            </div>
          </div>

          <button id="place-order-btn" class="w-full py-4 bg-primary-600 hover:bg-primary-700 text-white font-bold text-sm rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
            Place Order & Pay
          </button>
        </div>
      </aside>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/checkout.js"></script>
</body>
</html>
