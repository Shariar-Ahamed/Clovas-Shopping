<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Shop - Clovas Shopping</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Page Banner -->
  <section class="bg-slate-100 dark:bg-slate-900 py-12 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="font-serif text-3xl md:text-4xl font-bold">Premium Catalogue</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Browse and filter high-quality hand-stitched outfits and luxury watches</p>
      </div>
      <!-- Breadcrumb -->
      <div class="text-xs font-semibold uppercase tracking-wider text-slate-450 dark:text-slate-500 flex gap-2">
        <a href="index.html" class="hover:text-primary-500">Home</a>
        <span>/</span>
        <span class="text-slate-800 dark:text-white">Shop</span>
      </div>
    </div>
  </section>

  <!-- Shop Section -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="flex flex-col lg:flex-row gap-10">
      
      <!-- Filters Sidebar (Desktop) -->
      <aside class="w-full lg:w-1/4 flex-shrink-0">
        <div class="glass p-6 rounded-3xl sticky top-28 flex flex-col gap-6">
          <div class="flex justify-between items-center border-b border-slate-150 dark:border-slate-800 pb-4">
            <h3 class="font-serif text-lg font-bold">Refine Search</h3>
            <button id="clear-filters" class="text-xs font-bold text-red-500 hover:underline">Reset All</button>
          </div>

          <!-- Search Input -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Search Key</label>
            <div class="relative">
              <input type="text" id="filter-search" placeholder="Type name..." class="w-full pl-4 pr-10 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <span class="absolute right-3 top-3.5 text-slate-400"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></span>
            </div>
          </div>

          <!-- Gender Select -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Gender Category</label>
            <select id="filter-gender" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <option value="All">All Genders</option>
              <option value="Men">Men</option>
              <option value="Women">Women</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>

          <!-- Category Select -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Main Category</label>
            <div class="space-y-2 mt-1">
              <label class="flex items-center gap-2 text-sm font-medium text-slate-750 dark:text-slate-300">
                <input type="checkbox" name="category" value="Men" class="rounded text-primary-500 focus:ring-primary-500 border-slate-250 dark:border-slate-850">
                Men
              </label>
              <label class="flex items-center gap-2 text-sm font-medium text-slate-750 dark:text-slate-300">
                <input type="checkbox" name="category" value="Women" class="rounded text-primary-500 focus:ring-primary-500 border-slate-250 dark:border-slate-850">
                Women
              </label>
              <label class="flex items-center gap-2 text-sm font-medium text-slate-750 dark:text-slate-300">
                <input type="checkbox" name="category" value="Accessories" class="rounded text-primary-500 focus:ring-primary-500 border-slate-250 dark:border-slate-850">
                Accessories
              </label>
            </div>
          </div>

          <!-- Price Range Filter -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Price Budget (BDT)</label>
            <div class="flex gap-2">
              <input type="number" id="filter-min-price" placeholder="Min" class="w-1/2 px-3 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              <input type="number" id="filter-max-price" placeholder="Max" class="w-1/2 px-3 py-2.5 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>
          </div>

          <button id="apply-filters-btn" class="w-full py-3.5 text-xs font-bold text-white bg-slate-900 dark:bg-white dark:text-slate-900 rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 shadow transition-colors">Apply Filters</button>

        </div>
      </aside>

      <!-- Products Listing Area -->
      <section class="flex-grow">
        <!-- Top Toolbar -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800/40">
          <div class="text-sm font-semibold text-slate-655 dark:text-slate-400">
            Showing <span id="results-count" class="text-slate-855 dark:text-white">0</span> premium products
          </div>
          <!-- Sorting -->
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-455">Sort By</span>
            <select id="sort-select" class="px-3 py-2 text-xs rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
              <option value="newest">Newest Arrivals</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>
        </div>

        <!-- Products Grid -->
        <div id="shop-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
          <!-- Skeletons loaded initially -->
          <div class="shimmer h-[380px] rounded-3xl"></div>
          <div class="shimmer h-[380px] rounded-3xl"></div>
          <div class="shimmer h-[380px] rounded-3xl"></div>
        </div>

        <!-- Pagination -->
        <div id="pagination-container" class="mt-12 flex justify-center items-center gap-2">
          <!-- Page triggers injected here -->
        </div>

      </section>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/shop.js"></script>
</body>
</html>
