<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Shop - Clovas Shopping</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Page Banner -->
  <section class="bg-slate-100 dark:bg-slate-900 py-12 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="font-serif text-3xl md:text-4xl font-bold">Premium Catalogue</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Browse and filter high-quality hand-stitched outfits and luxury watches</p>
      </div>
      <!-- Breadcrumb -->
      <div class="text-xs font-semibold uppercase tracking-wider text-slate-450 dark:text-slate-500 flex gap-2">
        <a href="index.html" class="hover:text-primary-500">Home</a>
        <span>/</span>
        <span class="text-slate-800 dark:text-white">Shop</span>
      </div>
    </div>
  </section>

  <!-- Shop Section -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    
    <!-- Mobile Filter Toggle Button -->
    <div class="flex lg:hidden justify-between items-center w-full mb-6">
      <button id="toggle-filters-btn" class="flex-grow flex items-center justify-center gap-2 px-5 py-3.5 bg-slate-900 text-white font-bold rounded-2xl shadow hover:bg-slate-800 transition-colors text-sm">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
        Show Filters & Sorting
      </button>
    </div>

    <div class="flex flex-col lg:flex-row gap-10">
      
      <!-- Filters Sidebar (Collapsible on Mobile/Tablet) -->
      <aside id="filters-sidebar" class="hidden lg:block w-full lg:w-1/4 flex-shrink-0">
        <div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-6 rounded-3xl sticky top-28 flex flex-col gap-6">
          <div class="flex justify-between items-center border-b border-slate-150 dark:border-slate-800 pb-4">
            <h3 class="font-serif text-lg font-bold">Refine Search</h3>
            <button id="clear-filters" class="text-xs font-bold text-red-500 hover:underline">Reset All</button>
          </div>

          <!-- Search Input -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Search Key</label>
            <div class="relative">
              <input type="text" id="filter-search" placeholder="Type name..." class="w-full pl-4 pr-10 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <span class="absolute right-3 top-3.5 text-slate-400"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></span>
            </div>
          </div>

          <!-- Gender Select -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Gender Category</label>
            <select id="filter-gender" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <option value="All">All Genders</option>
              <option value="Men">Men</option>
              <option value="Women">Women</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>

          <!-- Sub Category Select -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Sub Category</label>
            <select id="filter-subcategory" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <option value="All">All Subcategories</option>
              <optgroup label="Men">
                <option value="Shirts">Shirts</option>
                <option value="T-Shirts">T-Shirts</option>
                <option value="Polo Shirts">Polo Shirts</option>
                <option value="Hoodies">Hoodies</option>
                <option value="Shoes">Shoes</option>
                <option value="Watches">Watches</option>
                <option value="Sunglasses">Sunglasses</option>
              </optgroup>
              <optgroup label="Women">
                <option value="Dresses">Dresses</option>
                <option value="Sarees">Sarees</option>
                <option value="Kurti">Kurti</option>
                <option value="Makeup">Makeup</option>
                <option value="Jewelry">Jewelry</option>
              </optgroup>
              <optgroup label="Accessories">
                <option value="Smart Watches">Smart Watches</option>
                <option value="Wallets">Wallets</option>
                <option value="Belts">Belts</option>
                <option value="Backpacks">Backpacks</option>
              </optgroup>
            </select>
          </div>

          <!-- Colors Filter -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Colors</label>
            <select id="filter-color" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <option value="All">Select One</option>
              <option value="Black">Black</option>
              <option value="White">White</option>
              <option value="Blue">Blue</option>
              <option value="Red">Red</option>
              <option value="Green">Green</option>
              <option value="Brown">Brown</option>
            </select>
          </div>

          <!-- Price Range Filter -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">Price</label>
            <!-- Dual range slider track -->
            <div class="relative w-full h-8 flex items-center pr-2">
              <div class="absolute h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full"></div>
              <div id="price-slider-track" class="absolute h-1.5 bg-orange-500 rounded-full" style="left: 0%; right: 0%;"></div>
              <input type="range" id="price-slider-min" min="0" max="15000" value="0" class="absolute w-full appearance-none bg-transparent pointer-events-none focus:outline-none z-10">
              <input type="range" id="price-slider-max" min="0" max="15000" value="15000" class="absolute w-full appearance-none bg-transparent pointer-events-none focus:outline-none z-20">
            </div>
            <!-- Min/Max numeric inputs -->
            <div class="flex items-center justify-between text-xs font-semibold text-slate-655 dark:text-slate-455 mt-1 gap-1">
              <div class="flex items-center gap-1">
                <span>Min</span>
                <input type="number" id="filter-min-price" value="0" class="w-14 px-2 py-1 text-center text-xs rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none">
                <span>৳</span>
              </div>
              <span class="text-slate-400 font-bold">-</span>
              <div class="flex items-center gap-1">
                <span>Max</span>
                <input type="number" id="filter-max-price" value="15000" class="w-18 px-2 py-1 text-center text-xs rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none">
                <span>৳</span>
              </div>
            </div>
          </div>

          <!-- Sort By Filter -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Sort By</label>
            <select id="sort-select" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
              <option value="newest">Latest Products</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>

          <button id="apply-filters-btn" class="w-full py-3.5 text-xs font-bold text-white bg-slate-900 dark:bg-white dark:text-slate-900 rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 shadow transition-colors">Apply Filters</button>

        </div>
      </aside>

      <!-- Products Listing Area -->
      <section class="flex-grow">
        <!-- Top Toolbar -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800/40">
          <div class="text-sm font-semibold text-slate-655 dark:text-slate-400">
            Showing <span id="results-count" class="text-slate-855 dark:text-white">0</span> premium products
          </div>
        </div>

        <!-- Products Grid -->
        <div id="shop-products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
          <!-- Skeletons loaded initially -->
          <div class="flex flex-col bg-white dark:bg-slate-900 rounded-2xl border border-slate-150 dark:border-slate-800/40 p-4 h-[380px] justify-between shadow-sm animate-pulse">
            <div>
              <div class="h-48 w-full rounded-xl bg-slate-100 dark:bg-slate-800 shimmer mb-4"></div>
              <div class="h-3 w-1/3 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2.5"></div>
              <div class="h-4 w-3/4 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2"></div>
              <div class="h-3 w-1/2 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
            <div class="flex justify-between items-center pt-3 border-t border-slate-100 dark:border-slate-800/20">
              <div class="h-5 w-20 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
              <div class="h-8 w-8 rounded-lg bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
          </div>
          <div class="flex flex-col bg-white dark:bg-slate-900 rounded-2xl border border-slate-150 dark:border-slate-800/40 p-4 h-[380px] justify-between shadow-sm animate-pulse">
            <div>
              <div class="h-48 w-full rounded-xl bg-slate-100 dark:bg-slate-800 shimmer mb-4"></div>
              <div class="h-3 w-1/3 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2.5"></div>
              <div class="h-4 w-3/4 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2"></div>
              <div class="h-3 w-1/2 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
            <div class="flex justify-between items-center pt-3 border-t border-slate-100 dark:border-slate-800/20">
              <div class="h-5 w-20 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
              <div class="h-8 w-8 rounded-lg bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
          </div>
          <div class="flex flex-col bg-white dark:bg-slate-900 rounded-2xl border border-slate-150 dark:border-slate-800/40 p-4 h-[380px] justify-between shadow-sm animate-pulse">
            <div>
              <div class="h-48 w-full rounded-xl bg-slate-100 dark:bg-slate-800 shimmer mb-4"></div>
              <div class="h-3 w-1/3 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2.5"></div>
              <div class="h-4 w-3/4 rounded bg-slate-100 dark:bg-slate-800 shimmer mb-2"></div>
              <div class="h-3 w-1/2 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
            <div class="flex justify-between items-center pt-3 border-t border-slate-100 dark:border-slate-800/20">
              <div class="h-5 w-20 rounded bg-slate-100 dark:bg-slate-800 shimmer"></div>
              <div class="h-8 w-8 rounded-lg bg-slate-100 dark:bg-slate-800 shimmer"></div>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <div id="pagination-container" class="mt-12 flex justify-center items-center gap-2">
          <!-- Page triggers injected here -->
        </div>

      </section>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/shop.js"></script>
</body>
</html>
